<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trade Compliance — DE Explorer</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --border: #e5e5e5;
    --text: #1f1f1f;
    --muted: #6b6b6b;
    --accent: #BF2038;
    --accent-hover: #9e1a2e;
    --accent-soft: #f7f7f7;
    --good: #2e7d32;
    --bad: #BF2038;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0; padding: 24px;
    background: var(--bg); color: var(--text);
    line-height: 1.5;
  }
  h1 { margin: 0 0 4px; font-weight: 600; font-size: 22px; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 20px; margin-bottom: 16px;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 8px 10px; font-size: 14px; width: 100%;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 12px; align-items: end; margin-bottom: 12px; }
  .row > * { flex: 1; }
  .row > button { flex: 0 0 auto; }
  button {
    background: var(--accent); color: #fff; border: 0;
    padding: 9px 18px; border-radius: 4px; font-weight: 600;
    cursor: pointer; font-size: 14px;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: wait; }
  pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px; overflow-x: auto;
    font-size: 12px; max-height: 380px; overflow-y: auto;
    margin: 0;
  }
  .result-summary {
    margin-bottom: 12px; padding: 10px 14px;
    background: var(--accent-soft); border-left: 3px solid var(--accent);
    border-radius: 4px; font-size: 13px;
  }
  .result-summary.error { background: #fdf0f2; border-color: var(--bad); }
  .result-summary strong { color: var(--accent-hover); }
  .result-summary.error strong { color: var(--bad); }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    background: var(--border); color: var(--text); font-size: 11px; margin: 2px 4px 2px 0;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .health-pill {
    padding: 4px 10px; border-radius: 12px; font-size: 12px;
    background: #eaf4ea; color: var(--good);
  }
  .health-pill.down { background: #fdf0f2; color: var(--bad); }
  .candidate {
    padding: 10px 12px; margin: 6px 0; background: var(--bg);
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; font-size: 13px;
  }
  .candidate:hover { border-color: var(--accent); background: #fdf0f2; }
  .candidate strong { color: var(--accent-hover); }
  section { margin-top: 14px; }
  section h3 { margin: 0 0 6px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
  .list-item {
    padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .list-item:last-child { border-bottom: 0; }
  .list-item .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Trade Compliance — DE Explorer</h1>
    <div class="subtitle">Only tests the data actually loaded: DE regulations → HS codes → notified bodies → harmonised standards.</div>
  </div>
  <div id="health" class="health-pill">checking…</div>
</header>

<div class="card">
  <div class="row">
    <div style="flex: 3;">
      <label>Product description</label>
      <input id="comp-product" value="electric drill" placeholder="e.g. pump, lift, X-ray unit, packaging machine">
    </div>
    <div style="flex: 1;">
      <label>Country</label>
      <input id="comp-country" value="DE" readonly>
    </div>
    <button onclick="findCandidates()">Find HS codes</button>
  </div>
  <div id="comp-summary"></div>
  <div id="comp-candidates"></div>
  <div id="comp-detail"></div>
  <pre id="comp-out" style="margin-top:12px;">Type a product, hit "Find HS codes", then click a candidate.</pre>
</div>

<script>
const API = window.location.origin;

async function fetchJson(url, opts = {}) {
  const r = await fetch(url, opts);
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch { data = { _raw: text }; }
  return { ok: r.ok, status: r.status, data };
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function checkHealth() {
  const el = document.getElementById('health');
  try {
    const { ok, data } = await fetchJson(`${API}/health`);
    if (ok) { el.textContent = `API ${data.version} ✓`; el.classList.remove('down'); }
    else { el.textContent = 'API down'; el.classList.add('down'); }
  } catch {
    el.textContent = 'API unreachable'; el.classList.add('down');
  }
}

async function findCandidates() {
  const product = document.getElementById('comp-product').value.trim();
  const country = document.getElementById('comp-country').value.trim().toUpperCase();
  const summaryEl = document.getElementById('comp-summary');
  const candEl = document.getElementById('comp-candidates');
  const detailEl = document.getElementById('comp-detail');
  const outEl = document.getElementById('comp-out');
  candEl.innerHTML = ''; detailEl.innerHTML = '';
  outEl.textContent = 'Searching…';
  const t0 = performance.now();
  const { ok, data } = await fetchJson(`${API}/hs-codes/candidates`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ country_code: country, product_description: product, limit: 10 }),
  });
  const ms = Math.round(performance.now() - t0);
  if (!ok) {
    summaryEl.innerHTML = `<div class="result-summary error"><strong>Error</strong> (${ms}ms)</div>`;
    outEl.textContent = JSON.stringify(data, null, 2);
    return;
  }
  const cs = data.candidates || [];
  if (cs.length === 0) {
    summaryEl.innerHTML = `<div class="result-summary error"><strong>No HS code candidates</strong> for "${escapeHtml(product)}". Try "pump", "valve", "lift", "motor".</div>`;
    outEl.textContent = JSON.stringify(data, null, 2);
    return;
  }
  summaryEl.innerHTML = `<div class="result-summary"><strong>${cs.length} HS candidates</strong> for "${escapeHtml(product)}" (${country}, scope ${data.country_scope}, ${ms}ms). Click one.</div>`;
  candEl.innerHTML = cs.map(c => `
    <div class="candidate" onclick="pickCandidate('${c.code}', '${country}')">
      <div><strong>${escapeHtml(c.code)}</strong> <span class="pill">${escapeHtml(c.code_type || '')}</span></div>
      <div style="color:var(--muted); margin-top:2px;">${escapeHtml(c.description || '')}</div>
    </div>`).join('');
  outEl.textContent = JSON.stringify(data, null, 2);
}

async function pickCandidate(hsCode, country) {
  const summaryEl = document.getElementById('comp-summary');
  const detailEl = document.getElementById('comp-detail');
  const outEl = document.getElementById('comp-out');
  detailEl.innerHTML = '';
  outEl.textContent = `Loading compliance for HS ${hsCode}…`;
  const t0 = performance.now();
  const { ok, data } = await fetchJson(`${API}/hs-codes/compliance-by-code`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ country_code: country, hs_code: hsCode }),
  });
  const ms = Math.round(performance.now() - t0);
  if (!ok) {
    summaryEl.innerHTML = `<div class="result-summary error"><strong>Error</strong> (${ms}ms)</div>`;
    outEl.textContent = JSON.stringify(data, null, 2);
    return;
  }
  const hs = data.hs_classification || {};
  const regs = data.regulations || [];
  const nbs = data.notified_bodies || [];
  const stds = data.harmonised_standards || [];
  const directives = Array.from(new Set([
    ...nbs.map(n => n.directive_ref),
    ...stds.map(s => s.directive_ref),
  ].filter(Boolean))).sort();

  summaryEl.innerHTML = `<div class="result-summary">
    <strong>HS ${escapeHtml(hs.code)}</strong> — ${escapeHtml(hs.description || '')}<br>
    ${regs.length} regulation(s) · ${nbs.length} notified bodies · ${stds.length} harmonised standards · ${ms}ms
  </div>`;

  // Regulations
  let html = '';
  if (regs.length) {
    html += `<section><h3>Regulations (${regs.length})</h3>` +
      regs.map(r => `<div class="list-item"><strong>${escapeHtml(r.title)}</strong>
        <div class="meta">${escapeHtml(r.document_type || '')} · ${escapeHtml(r.authority || '')} · ${escapeHtml(r.status || '')}</div>
      </div>`).join('') + `</section>`;
  } else {
    html += `<section><h3>Regulations</h3><div class="list-item" style="color:var(--muted)">No regulations matched this HS code.</div></section>`;
  }

  // Directive breakdown
  if (directives.length) {
    const nbByDir = nbs.reduce((a, b) => (a[b.directive_ref] = (a[b.directive_ref] || 0) + 1, a), {});
    const stdByDir = stds.reduce((a, s) => (a[s.directive_ref] = (a[s.directive_ref] || 0) + 1, a), {});
    html += `<section><h3>Per-directive breakdown</h3>` +
      directives.map(d => `<div class="list-item">
        <strong>${escapeHtml(d)}</strong>
        <div class="meta">${nbByDir[d] || 0} notified bodies · ${stdByDir[d] || 0} harmonised standards</div>
      </div>`).join('') + `</section>`;
  }

  // Notified bodies (first 10)
  if (nbs.length) {
    const shown = nbs.slice(0, 10);
    html += `<section><h3>Notified bodies (showing ${shown.length} of ${nbs.length})</h3>` +
      shown.map(nb => `<div class="list-item">
        <strong>NB ${escapeHtml(nb.nb_number)}</strong> — ${escapeHtml(nb.name)}
        <div class="meta">${escapeHtml(nb.city || '')} · ${escapeHtml(nb.directive_ref)} · ${escapeHtml(nb.notifying_authority || '')}</div>
      </div>`).join('') + `</section>`;
  }

  // Harmonised standards (first 10)
  if (stds.length) {
    const shown = stds.slice(0, 10);
    html += `<section><h3>Harmonised standards (showing ${shown.length} of ${stds.length})</h3>` +
      shown.map(s => `<div class="list-item">
        <strong>${escapeHtml(s.standard_code)}</strong>
        <div class="meta">${escapeHtml(s.title || '')} · ${escapeHtml(s.eso || '')} · ${escapeHtml(s.directive_ref)}</div>
      </div>`).join('') + `</section>`;
  }

  detailEl.innerHTML = html;
  outEl.textContent = JSON.stringify(data, null, 2);
}

checkHealth();
</script>
</body>
</html>
